name: Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global protocol.file.allow always

      - name: Run Integration Tests
        run: |
          chmod +x tests/test_brick.sh
          ./tests/test_brick.sh